name: WaniKani Streak Check 🦀

on:
  schedule:
    # 19:00 UTC = 21:00 CEST (UTC+2, summer)
    # Change to '0 20 * * *' in winter (CET, UTC+1)
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  streak-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x ./streak_check.sh

      - name: Run streak check
        run: ./streak_check.sh
        env:
          WANIKANI_API_TOKEN:    ${{ secrets.WANIKANI_API_TOKEN }}
          GMAIL_CLIENT_ID:       ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:   ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:   ${{ secrets.GMAIL_REFRESH_TOKEN }}
          MY_EMAIL:              ${{ secrets.MY_EMAIL }}
          FROM_EMAIL:            ${{ secrets.FROM_EMAIL }}
          TIMEZONE_OFFSET_HOURS: ${{ vars.TIMEZONE_OFFSET_HOURS }}
          DEADLINE_HOUR:         ${{ vars.DEADLINE_HOUR }}
